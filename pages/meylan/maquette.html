<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BarberClub Meylan — Maquette</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="../../assets/icons/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'Orbitron';
  src: url('../../assets/fonts/Orbitron-ExtraBold.ttf') format('truetype');
  font-weight: 800; font-display: swap;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: #000; color: #fff;
  overflow-x: hidden;
  min-height: 100vh; min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
}
@media (pointer: fine) { body { cursor: none; } }

/* ═══ CUSTOM CURSOR ═══ */
.cursor-dot {
  position: fixed; width: 8px; height: 8px;
  background: #fff; border-radius: 50%;
  pointer-events: none; z-index: 10001;
  mix-blend-mode: difference;
  transform: translate(-50%, -50%);
}
.cursor-ring {
  position: fixed; width: 40px; height: 40px;
  border: 1.5px solid rgba(255,255,255,0.3);
  border-radius: 50%; pointer-events: none; z-index: 10001;
  mix-blend-mode: difference;
  transition: width 0.35s cubic-bezier(0.16,1,0.3,1), height 0.35s cubic-bezier(0.16,1,0.3,1), border-color 0.3s;
  transform: translate(-50%, -50%);
}
.cursor-ring.hovering { width: 64px; height: 64px; border-color: rgba(255,255,255,0.8); }
@media (pointer: coarse) { .cursor-dot, .cursor-ring { display: none !important; } }

/* ═══ GRAIN ═══ */
.grain {
  position: fixed; inset: 0; z-index: 9000; pointer-events: none;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat: repeat; background-size: 180px;
}

/* ═══ PAGE TRANSITION ═══ */
.page-transition {
  position: fixed; inset: 0; z-index: 9999;
  background: #000; pointer-events: none;
  opacity: 0; transition: opacity 0.7s cubic-bezier(0.4,0,0.2,1);
}
.page-transition.active { opacity: 1; pointer-events: all; }

/* ═══ PAGE ═══ */
.page {
  min-height: 100vh; min-height: 100dvh;
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
}

/* ═══ BACKGROUND ═══ */
.bg {
  position: absolute; inset: -40px;
  background: url('../../assets/images/salons/meylan/salon-meylan-interieur.jpg') center/cover no-repeat;
  filter: brightness(0.28) saturate(0.7);
  will-change: transform;
  animation: kenBurns 25s ease-in-out infinite alternate;
}
@keyframes kenBurns {
  0%   { transform: scale(1) translate(0, 0); }
  100% { transform: scale(1.15) translate(-1.5%, -1%); }
}

.bg-light {
  position: absolute; inset: -40px;
  background: url('../../assets/images/salons/meylan/salon-meylan-interieur.jpg') center/cover no-repeat;
  filter: brightness(0.7) saturate(1.2) contrast(1.05);
  pointer-events: none; z-index: 1;
  -webkit-mask-image: radial-gradient(circle 0px at -100px -100px, black 0%, transparent 100%);
  mask-image: radial-gradient(circle 0px at -100px -100px, black 0%, transparent 100%);
}

.bg-overlay {
  position: absolute; inset: 0; z-index: 2;
  background: linear-gradient(180deg,
    rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.2) 25%,
    rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.7) 80%, rgba(0,0,0,0.9) 100%);
}

.volumetric {
  position: absolute; inset: 0; z-index: 2; pointer-events: none;
  background: radial-gradient(ellipse 60% 40% at var(--vl-x, 50%) var(--vl-y, 15%), rgba(255,255,255,0.04) 0%, transparent 70%);
  mix-blend-mode: screen;
}

.particles { position: absolute; inset: 0; pointer-events: none; z-index: 3; overflow: hidden; }
.particle {
  position: absolute; border-radius: 50%; background: rgba(255,255,255,0.25);
  animation: particleFloat linear infinite;
}
@keyframes particleFloat {
  0% { transform: translateY(0) translateX(0); opacity: 0; }
  8% { opacity: 0.4; } 92% { opacity: 0.4; }
  100% { transform: translateY(-110vh) translateX(15px); opacity: 0; }
}

/* ═══ HEADER ═══ */
.header {
  position: relative; z-index: 10; padding: 20px;
  display: flex; align-items: center;
}
.back-btn {
  width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 50%;
  color: #fff; text-decoration: none;
  transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
  opacity: 0; animation: fadeIn 0.5s ease 0.1s forwards;
}
@media (pointer: fine) { .back-btn { cursor: none; } }
.back-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.15); }
.back-btn svg { width: 20px; height: 20px; }

.header-logo {
  position: absolute; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  opacity: 0; animation: fadeIn 0.8s ease 0.15s forwards;
}
.header-crown { width: 14px; height: auto; opacity: 0.3; animation: crownFloat 5s ease-in-out infinite; }
@keyframes crownFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
.header-logo img:last-child { height: 50px; width: auto; }

/* ═══ HERO ═══ */
.hero {
  position: relative; z-index: 10; flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 20px; text-align: center;
}
.hero-title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(48px, 16vw, 90px); font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.06em;
  line-height: 0.95; overflow: hidden; position: relative;
}
.hero-title .letter {
  display: inline-block; opacity: 0; transform: translateY(110%);
  transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.16,1,0.3,1);
}
.page.loaded .hero-title .letter { opacity: 1; transform: translateY(0); }
.hero-title::after {
  content: ''; position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
  animation: shimmer 6s ease-in-out infinite 3s; pointer-events: none;
}
@keyframes shimmer { 0% { left: -60%; } 30% { left: 120%; } 100% { left: 120%; } }

.hero-subtitle {
  font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase;
  color: rgba(255,255,255,0.3); font-weight: 400; margin-top: 10px;
  opacity: 0; transform: translateY(10px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.page.loaded .hero-subtitle { opacity: 1; transform: translateY(0); transition-delay: 0.5s; }

/* ═══ SEPARATOR ═══ */
.separator {
  position: relative; z-index: 10; height: 1px; margin: 0 40px 20px;
  opacity: 0; transition: opacity 0.8s ease;
}
.page.loaded .separator { opacity: 1; transition-delay: 0.7s; }
.separator-line { position: absolute; inset: 0; background: rgba(255,255,255,0.08); }
.separator-line::after {
  content: ''; position: absolute; top: -4px; width: 30px; height: 9px; border-radius: 50%;
  background: radial-gradient(ellipse, rgba(255,255,255,0.4) 0%, transparent 70%);
  animation: sepTravel 5s ease-in-out infinite;
}
@keyframes sepTravel { 0% { left: 0%; opacity: 0.3; } 50% { left: 90%; opacity: 1; } 100% { left: 0%; opacity: 0.3; } }

/* ═══ NAV ═══ */
.nav { position: relative; z-index: 10; padding: 0 20px; padding-bottom: max(30px, env(safe-area-inset-bottom)); }
.nav-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 500px; margin: 0 auto; }

.nav-item {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  padding: 18px 16px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 14px;
  color: #fff; text-decoration: none;
  font-family: 'Orbitron', sans-serif; font-size: 12px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.1em;
  transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
  position: relative; overflow: hidden;
  opacity: 0; transform: translateY(20px);
}
@media (pointer: fine) { .nav-item { cursor: none; } }
.page.loaded .nav-item { opacity: 1; transform: translateY(0); }
.page.loaded .nav-item:nth-child(1) { transition-delay: 0.3s; }
.page.loaded .nav-item:nth-child(2) { transition-delay: 0.38s; }
.page.loaded .nav-item:nth-child(3) { transition-delay: 0.46s; }
.page.loaded .nav-item:nth-child(4) { transition-delay: 0.54s; }
.page.loaded .nav-item:nth-child(5) { transition-delay: 0.62s; }

.nav-item::after {
  content: ''; position: absolute; top: 0; left: -80%; width: 50%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
  animation: ctaShimmer 8s ease-in-out infinite; pointer-events: none;
}
@keyframes ctaShimmer { 0% { left: -50%; } 20% { left: 120%; } 100% { left: 120%; } }
.nav-item:active { transform: scale(0.96) !important; background: rgba(255,255,255,0.12); }
.nav-item svg { width: 18px; height: 18px; min-width: 18px; flex-shrink: 0; opacity: 0.7; position: relative; z-index: 1; }
.nav-item.full { grid-column: span 2; }

.nav-item.cta {
  background: rgba(255,255,255,0.95); border: 1px solid rgba(255,255,255,1);
  color: #000; font-weight: 800;
  box-shadow: 0 4px 25px rgba(255,255,255,0.15), 0 0 60px rgba(255,255,255,0.05);
}
.nav-item.cta svg { opacity: 1; color: #000; }
.nav-item.cta:active { background: rgba(255,255,255,0.85); box-shadow: 0 2px 15px rgba(255,255,255,0.1); }
.nav-item.cta::after { background: linear-gradient(90deg, transparent, rgba(0,0,0,0.06), transparent); animation: ctaShimmer 4s ease-in-out infinite; }

.ripple {
  position: absolute; border-radius: 50%; background: rgba(255,255,255,0.15);
  transform: scale(0); animation: rippleAnim 0.6s ease-out forwards; pointer-events: none; z-index: 2;
}
.nav-item.cta .ripple { background: rgba(0,0,0,0.1); }
@keyframes rippleAnim { to { transform: scale(4); opacity: 0; } }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ═══ DESKTOP ═══ */
@media (min-width: 768px) {
  .nav { max-width: 600px; margin: 0 auto; padding-bottom: 60px; }
  .nav-item:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.25); transform: translateY(-3px); box-shadow: 0 8px 30px rgba(255,255,255,0.05); }
  .nav-item.cta:hover { transform: translateY(-3px); box-shadow: 0 8px 35px rgba(255,255,255,0.25); }
  .header-logo img:last-child { height: 60px; }
  .back-btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.2); }
}

/* ═══ REDUCED MOTION ═══ */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; animation-delay: 0s !important; transition-duration: 0.01ms !important; }
  .hero-title .letter, .hero-subtitle, .nav-item, .back-btn, .separator { opacity: 1; transform: none; }
  .cursor-dot, .cursor-ring { display: none; } body { cursor: auto; }
  .bg { animation: none !important; }
}
a:focus-visible { outline: 2px solid rgba(255,255,255,0.5); outline-offset: 4px; border-radius: 4px; }
</style>
</head>
<body>
<div class="grain" aria-hidden="true"></div>
<div class="page-transition" aria-hidden="true"></div>
<div class="cursor-dot" aria-hidden="true"></div>
<div class="cursor-ring" aria-hidden="true"></div>

<div class="page" id="page">
  <div class="bg"></div>
  <div class="bg-light"></div>
  <div class="bg-overlay"></div>
  <div class="volumetric"></div>
  <div class="particles" aria-hidden="true"></div>

  <header class="header">
    <a href="../../prototype-landing.html" class="back-btn" aria-label="Retour">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </a>
    <div class="header-logo">
      <img src="../../assets/images/common/couronne.png" alt="" class="header-crown" aria-hidden="true">
      <img src="../../assets/images/common/logo-blanc.png" alt="BarberClub">
    </div>
  </header>

  <div class="hero">
    <h1 class="hero-title" data-split>Meylan</h1>
    <p class="hero-subtitle">Votre Barbier à Meylan</p>
  </div>

  <div class="separator" aria-hidden="true"><div class="separator-line"></div></div>

  <nav class="nav">
    <div class="nav-grid">
      <a href="barbers.html" class="nav-item" data-magnetic>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>Barbers</span>
      </a>
      <a href="prestations.html" class="nav-item" data-magnetic>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
        <span>Tarifs</span>
      </a>
      <a href="reserver.html" class="nav-item full cta" data-magnetic>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Rendez-vous</span>
      </a>
      <a href="galerie.html" class="nav-item" data-magnetic>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Salon</span>
      </a>
      <a href="contact.html" class="nav-item" data-magnetic>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <span>Contact</span>
      </a>
    </div>
  </nav>
</div>

<script>
(() => {
  'use strict';
  const prefersReduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const isTouch = matchMedia('(pointer: coarse)').matches;
  const page = document.getElementById('page');
  requestAnimationFrame(() => page.classList.add('loaded'));

  /* Letter split */
  document.querySelectorAll('[data-split]').forEach(el => {
    const text = el.textContent; el.innerHTML = '';
    [...text].forEach((ch, i) => {
      const s = document.createElement('span');
      s.className = 'letter';
      s.textContent = ch === ' ' ? '\u00A0' : ch;
      s.style.transitionDelay = `${0.15 + i * 0.06}s`;
      el.appendChild(s);
    });
  });

  /* Particles */
  if (!prefersReduced) {
    const c = document.querySelector('.particles');
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div'); p.className = 'particle';
      const size = 1 + Math.random() * 2;
      p.style.cssText = `left:${Math.random()*100}%;bottom:-3%;width:${size}px;height:${size}px;animation-duration:${8+Math.random()*14}s;animation-delay:${Math.random()*10}s;opacity:0;`;
      c.appendChild(p);
    }
  }

  /* Touch light */
  if (isTouch && !prefersReduced) {
    const light = document.querySelector('.bg-light');
    let active = false;
    document.addEventListener('touchstart', e => { active = true; updateLight(e.touches[0]); }, { passive: true });
    document.addEventListener('touchmove', e => { if (active) updateLight(e.touches[0]); }, { passive: true });
    document.addEventListener('touchend', () => { active = false; light.style.webkitMaskImage = light.style.maskImage = 'radial-gradient(circle 0px at -200px -200px, black 0%, transparent 100%)'; }, { passive: true });
    function updateLight(t) {
      const g = `radial-gradient(circle 130px at ${t.clientX+40}px ${t.clientY+40}px, black 0%, transparent 100%)`;
      light.style.webkitMaskImage = light.style.maskImage = g;
    }
  }

  /* Mouse light */
  if (!isTouch && !prefersReduced) {
    const light = document.querySelector('.bg-light');
    document.addEventListener('mousemove', e => {
      const g = `radial-gradient(circle 160px at ${e.clientX+40}px ${e.clientY+40}px, black 0%, transparent 100%)`;
      light.style.webkitMaskImage = light.style.maskImage = g;
    });
  }

  /* Gyroscope */
  if (isTouch && !prefersReduced) {
    const bg = document.querySelector('.bg'), bgL = document.querySelector('.bg-light'), vol = document.querySelector('.volumetric');
    function handleO(e) {
      const b = Math.max(-30, Math.min(30, e.beta||0)), g = Math.max(-30, Math.min(30, e.gamma||0));
      const tx = (g/30)*-12, ty = (b/60)*-8;
      bg.style.transform = bgL.style.transform = `translate(${tx}px,${ty}px) scale(1.1)`;
      vol.style.setProperty('--vl-x',(50+(g/30)*20)+'%'); vol.style.setProperty('--vl-y',(15+(b/60)*15)+'%');
    }
    if (typeof DeviceOrientationEvent!=='undefined' && typeof DeviceOrientationEvent.requestPermission==='function') {
      document.addEventListener('touchstart', function req() { DeviceOrientationEvent.requestPermission().then(s=>{if(s==='granted')window.addEventListener('deviceorientation',handleO,{passive:true})}).catch(()=>{}); document.removeEventListener('touchstart',req); }, {once:true});
    } else if (typeof DeviceOrientationEvent!=='undefined') { window.addEventListener('deviceorientation',handleO,{passive:true}); }
  }

  /* Mouse parallax */
  if (!isTouch && !prefersReduced) {
    const bg = document.querySelector('.bg'), bgL = document.querySelector('.bg-light'), vol = document.querySelector('.volumetric');
    document.addEventListener('mousemove', e => {
      const lx = (e.clientX/window.innerWidth-0.5)*2, ly = (e.clientY/window.innerHeight-0.5)*2;
      bg.style.transform = bgL.style.transform = `translate(${lx*-10}px,${ly*-8}px) scale(1.1)`;
      vol.style.setProperty('--vl-x',(50+lx*25)+'%'); vol.style.setProperty('--vl-y',(25+ly*15)+'%');
    });
  }

  /* Custom cursor */
  if (!isTouch) {
    const dot = document.querySelector('.cursor-dot'), ring = document.querySelector('.cursor-ring');
    let mx=-100,my=-100,rx=-100,ry=-100;
    document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; dot.style.left=mx+'px'; dot.style.top=my+'px'; });
    (function loop(){ rx+=(mx-rx)*0.12; ry+=(my-ry)*0.12; ring.style.left=rx+'px'; ring.style.top=ry+'px'; requestAnimationFrame(loop); })();
    document.querySelectorAll('a,[data-magnetic]').forEach(el => {
      el.addEventListener('mouseenter', () => ring.classList.add('hovering'));
      el.addEventListener('mouseleave', () => ring.classList.remove('hovering'));
    });
  }

  /* Magnetic */
  if (!isTouch && !prefersReduced) {
    document.querySelectorAll('[data-magnetic]').forEach(btn => {
      btn.addEventListener('mousemove', e => { const r=btn.getBoundingClientRect(); btn.style.transform=`translate(${(e.clientX-r.left-r.width/2)*0.25}px,${(e.clientY-r.top-r.height/2)*0.25}px)`; });
      btn.addEventListener('mouseleave', () => { btn.style.transform=''; });
    });
  }

  /* Ripple */
  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.addEventListener('click', function(e) {
      const r=this.getBoundingClientRect(), rip=document.createElement('span'); rip.className='ripple';
      const sz=Math.max(r.width,r.height);
      rip.style.cssText=`width:${sz}px;height:${sz}px;left:${e.clientX-r.left-sz/2}px;top:${e.clientY-r.top-sz/2}px`;
      this.appendChild(rip); rip.addEventListener('animationend',()=>rip.remove());
    });
  });

  /* Page transition */
  const trans = document.querySelector('.page-transition');
  document.querySelectorAll('.nav-item,.back-btn').forEach(link => {
    link.addEventListener('click', function(e) {
      e.preventDefault(); trans.classList.add('active');
      setTimeout(() => { window.location.href = this.getAttribute('href'); }, 700);
    });
  });
})();
</script>
</body>
</html>
