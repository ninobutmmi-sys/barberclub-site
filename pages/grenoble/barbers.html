<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nos Barbiers Grenoble | Équipe BarberClub - Coiffeurs Experts</title>
    <meta name="description"
        content="Rencontrez l'équipe de barbiers BarberClub Grenoble : Tom, Alan, Nathan, Clément. Coiffeurs experts en dégradés et barbe. Prenez RDV avec votre barbier préféré !">
    <meta name="keywords"
        content="barbier grenoble, coiffeur homme grenoble, équipe barber grenoble, meilleur barbier grenoble, coiffeur expert grenoble">
    <link rel="manifest" href="../../config/manifest.json">
    <link rel="icon" type="image/png" sizes="96x96" href="../../assets/icons/favicon.png">
    <link rel="apple-touch-icon" href="../../assets/icons/icon-192x192.png">
    <style>
        /* ORBITRON EXTRA BOLD FONT */
        @font-face {
            font-family: 'Orbitron';
            src: url('../../assets/fonts/Orbitron-ExtraBold.ttf') format('truetype');
            font-weight: 800;
            font-style: normal;
            font-display: swap;
        }


        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* BACKGROUND */
        .bg-fixed {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: url('../../assets/images/salons/grenoble/salon-grenoble.jpg') center/cover no-repeat;
            filter: blur(25px) brightness(0.2);
            transform: scale(1.15);
        }

        /* HEADER */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .header.scrolled {
            background: rgba(0, 0, 0, 1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .back-btn {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 50%;
            color: #fff;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .back-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.2);
        }

        .back-btn svg {
            width: 18px;
            height: 18px;
        }

        .logo {
            height: 40px;
            width: auto;
        }

        .header-spacer {
            width: 40px;
        }

        /* PAGE HEADER */
        .page-header {
            position: relative;
            z-index: 1;
            padding: 110px 20px 30px;
            text-align: center;
        }

        .page-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 36px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 6px;
        }

        .page-subtitle {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        /* CONTENT */
        .content {
            position: relative;
            z-index: 1;
            padding: 10px 16px 120px;
        }

        /* BARBERS GRID */
        .barbers-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .barber-card {
            display: block;
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #fff;
        }

        .barber-card:active {
            transform: scale(0.97);
        }

        .barber-photo {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            background: rgba(255, 255, 255, 0.05);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .barber-card:active .barber-photo {
            transform: scale(1.05);
        }

        .barber-arrow {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            opacity: 0.7;
            transition: all 0.3s ease;
        }

        .barber-arrow svg {
            width: 14px;
            height: 14px;
        }

        .barber-info {
            padding: 14px;
            text-align: center;
        }

        .barber-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        .barber-role {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed;
            bottom: 12px;
            left: 12px;
            right: 12px;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 8px 4px;
            padding-bottom: max(8px, env(safe-area-inset-bottom));
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            z-index: 50;
        }

        .nav-row {
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 9px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            transition: color 0.3s ease;
            padding: 4px 8px;
        }

        .nav-item.active {
            color: #fff;
        }

        .nav-item svg {
            width: 20px;
            height: 20px;
        }

        /* CTA Central */
        .nav-cta {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            margin-top: -26px;
        }

        .nav-cta-btn {
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            border-radius: 50%;
            color: #000;
            box-shadow: 0 4px 20px rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        .nav-cta-btn svg {
            width: 22px;
            height: 22px;
        }

        .nav-cta:active .nav-cta-btn {
            transform: scale(0.95);
            box-shadow: 0 2px 12px rgba(255, 255, 255, 0.2);
        }

        .nav-cta-label {
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            color: #fff;
        }

        /* ANIMATIONS */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .barber-card {
            opacity: 0;
            animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .barber-card:nth-child(1) {
            animation-delay: 0.1s;
        }

        .barber-card:nth-child(2) {
            animation-delay: 0.15s;
        }

        .barber-card:nth-child(3) {
            animation-delay: 0.2s;
        }

        .barber-card:nth-child(4) {
            animation-delay: 0.25s;
        }

        /* DESKTOP */
        @media (min-width: 768px) {
            .content {
                max-width: 600px;
                margin: 0 auto;
            }

            .logo {
                height: 75px;
            }

            .barber-card:hover {
                transform: translateY(-4px);
                border-color: rgba(255, 255, 255, 0.2);
            }

            .barber-card:hover .barber-arrow {
                opacity: 1;
                background: rgba(255, 255, 255, 0.2);
            }
        }

        /* REDUCED MOTION */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }

            .barber-card {
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <script>
        const header = document.getElementById('header');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        }, { passive: true });
    </script>
