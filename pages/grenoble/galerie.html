<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Galerie Coiffures Grenoble | BarberClub - Photos Coupes & Dégradés</title>
    <meta name="description"
        content="Galerie BarberClub Grenoble : découvrez nos réalisations en photos. Dégradés, coupes tendance, tailles de barbe. Inspirez-vous pour votre prochaine coupe !">
    <meta name="keywords"
        content="galerie coiffeur grenoble, photos dégradé grenoble, réalisations barbier grenoble, coupes homme grenoble, salon coiffure grenoble photos">
    <link rel="manifest" href="../../config/manifest.json">
    <link rel="icon" type="image/png" sizes="96x96" href="../../assets/icons/favicon.png">
    <link rel="apple-touch-icon" href="../../assets/icons/icon-192x192.png">
    <style>
        /* ORBITRON EXTRA BOLD FONT */
        @font-face {
            font-family: 'Orbitron';
            src: url('../../assets/fonts/Orbitron-ExtraBold.ttf') format('truetype');
            font-weight: 800;
            font-style: normal;
            font-display: swap;
        }


        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* BACKGROUND IMAGE FLOUE */
        .bg-fixed {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: url('../../assets/images/salons/grenoble/salon-grenoble.jpg') center/cover no-repeat;
            filter: blur(25px) brightness(0.2);
            transform: scale(1.15);
        }

        /* HEADER */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .header.scrolled {
            background: rgba(0, 0, 0, 1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .back-btn {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 50%;
            color: #fff;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .back-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.2);
        }

        .back-btn svg {
            width: 18px;
            height: 18px;
        }

        .logo {
            height: 40px;
            width: auto;
        }

        .header-spacer {
            width: 40px;
        }

        /* PAGE TITLE */
        .page-header {
            padding: 110px 20px 30px;
            text-align: center;
        }

        .page-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 40px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 6px;
        }

        .page-subtitle {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }


        /* GALLERY SECTION */
        .gallery-section {
            padding: 0 10px 100px;
        }

        /* MASONRY GALLERY */
        .gallery {
            columns: 2;
            column-gap: 10px;
        }

        .gallery-item {
            break-inside: avoid;
            margin-bottom: 10px;
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            transform: translateY(20px);
            opacity: 0;
            animation: fadeInUp 0.5s ease forwards;
        }

        .gallery-item:nth-child(1) {
            animation-delay: 0.05s;
        }

        .gallery-item:nth-child(2) {
            animation-delay: 0.1s;
        }

        .gallery-item:nth-child(3) {
            animation-delay: 0.15s;
        }

        .gallery-item:nth-child(4) {
            animation-delay: 0.2s;
        }

        .gallery-item:nth-child(5) {
            animation-delay: 0.25s;
        }

        .gallery-item:nth-child(6) {
            animation-delay: 0.3s;
        }

        .gallery-item:nth-child(7) {
            animation-delay: 0.35s;
        }

        .gallery-item:nth-child(8) {
            animation-delay: 0.4s;
        }

        .gallery-item:nth-child(9) {
            animation-delay: 0.45s;
        }

        .gallery-item:nth-child(10) {
            animation-delay: 0.5s;
        }

        .gallery-item:nth-child(11) {
            animation-delay: 0.55s;
        }

        .gallery-item:nth-child(12) {
            animation-delay: 0.6s;
        }

        @keyframes fadeInUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .gallery-item picture {
            display: block;
        }

        .gallery-item img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.5s ease;
        }

        .gallery-item:active img {
            transform: scale(1.05);
        }

        /* Item info overlay */
        .item-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 35px 12px 12px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.85) 0%, transparent 100%);
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .gallery-item:hover .item-info,
        .gallery-item:active .item-info {
            transform: translateY(0);
        }

        .item-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .item-barber {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 2px;
        }

        /* PLACEHOLDER IMAGES */
        .placeholder {
            background: linear-gradient(145deg, rgba(40, 40, 40, 0.95) 0%, rgba(60, 60, 60, 0.95) 100%);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .placeholder::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg,
                    transparent 0%,
                    rgba(255, 255, 255, 0.03) 50%,
                    transparent 100%);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }

        .placeholder-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.1);
        }

        .placeholder-icon svg {
            width: 32px;
            height: 32px;
        }

        /* Different heights for masonry effect */
        .h-sm {
            aspect-ratio: 1/1;
        }

        .h-md {
            aspect-ratio: 3/4;
        }

        .h-lg {
            aspect-ratio: 2/3;
        }

        .h-xl {
            aspect-ratio: 9/16;
        }

        /* LIGHTBOX */
        .lightbox {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0, 0, 0, 0.97);
            display: flex;
            flex-direction: column;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .lightbox.active {
            opacity: 1;
            visibility: visible;
        }

        .lightbox-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
        }

        .lightbox-close {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50%;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .lightbox-close:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.2);
        }

        .lightbox-close svg {
            width: 24px;
            height: 24px;
        }

        .lightbox-counter {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            letter-spacing: 0.1em;
            color: rgba(255, 255, 255, 0.6);
        }

        .lightbox-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        .lightbox-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 12px;
            transform: scale(0.9);
            opacity: 0;
            transition: all 0.3s ease;
        }

        .lightbox.active .lightbox-image {
            transform: scale(1);
            opacity: 1;
        }

        .lightbox-nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            padding-bottom: max(20px, env(safe-area-inset-bottom));
        }

        .lightbox-nav button {
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .lightbox-nav button:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.2);
        }

        .lightbox-nav button svg {
            width: 24px;
            height: 24px;
        }

        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 12px;
            padding-bottom: max(8px, env(safe-area-inset-bottom));
            z-index: 50;
        }

        .nav-row {
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 9px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            transition: color 0.3s ease;
            padding: 6px 8px;
        }

        .nav-item.active {
            color: #fff;
        }

        .nav-item svg {
            width: 20px;
            height: 20px;
        }

        /* CTA Central */
        .nav-cta {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            margin-top: -28px;
        }

        .nav-cta-btn {
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            border-radius: 50%;
            color: #000;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        .nav-cta-btn svg {
            width: 24px;
            height: 24px;
        }

        .nav-cta:active .nav-cta-btn {
            transform: scale(0.95);
            box-shadow: 0 2px 10px rgba(255, 255, 255, 0.2);
        }

        .nav-cta-label {
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            color: #fff;
        }

        /* DESKTOP */
        @media (min-width: 768px) {
            .gallery {
                columns: 3;
                max-width: 1000px;
                margin: 0 auto;
            }

            .gallery-item:hover img {
                transform: scale(1.05);
            }

            .filter-btn:hover:not(.active) {
                background: rgba(255, 255, 255, 0.12);
                border-color: rgba(255, 255, 255, 0.2);
            }

            .logo {
                height: 75px;
            }
        }

        @media (min-width: 1024px) {
            .gallery {
                columns: 4;
                max-width: 1400px;
            }
        }

        /* REDUCED MOTION */
        @media (prefers-reduced-motion: reduce) {

            *,
            .placeholder::before {
                animation: none !important;
                transition: none !important;
            }
        }
    </style>
</head>

<body>
    <!-- BACKGROUND FLOUE -->
    <div class="bg-fixed"></div>

    <!-- HEADER -->
    <header class="header" id="header">
        <a href="../../" class="back-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M19 12H5M12 19l-7-7 7-7" />
            </svg>
        </a>
        <a href="../../" class="logo-link"><img src="../../assets/images/common/logo-blanc.png" alt="BarberClub" class="logo"></a>
        <div class="header-spacer"></div>
    </header>

    <!-- PAGE HEADER -->
    <div class="page-header">
        <h1 class="page-title">Galerie</h1>
        <p class="page-subtitle">Salon de Grenoble</p>
    </div>


    <!-- GALLERY -->
    <section class="gallery-section">
        <h2 class="section-title" style="padding: 0 10px; font-size: 20px; margin-bottom: 16px; font-family: 'Orbitron', sans-serif; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em;">Notre Salon</h2>
        <div class="gallery" id="gallery">
            <!-- Salon -->
            <div class="gallery-item">
                <picture>
                    <source srcset="../../assets/images/salons/grenoble/salon-grenoble.webp" type="image/webp">
                    <img src="../../assets/images/salons/grenoble/salon-grenoble.jpg" alt="Intérieur du salon BarberClub Grenoble">
                </picture>
                <div class="item-info">
                    <p class="item-title">L'Intérieur</p>
                </div>
            </div>

            <!-- Miroir -->
            <div class="gallery-item">
                <picture>
                    <source srcset="../../assets/images/salons/grenoble/miroir-grenoble.webp" type="image/webp">
                    <img src="../../assets/images/salons/grenoble/miroir-grenoble.jpg" alt="Miroir et postes de coupe">
                </picture>
                <div class="item-info">
                    <p class="item-title">Les Postes</p>
                </div>
            </div>

            <!-- Comptoir -->
            <div class="gallery-item">
                <picture>
                    <source srcset="../../assets/images/salons/grenoble/comptoir-grenoble.webp" type="image/webp">
                    <img src="../../assets/images/salons/grenoble/comptoir-grenoble.jpg" alt="Comptoir d'accueil">
                </picture>
                <div class="item-info">
                    <p class="item-title">Le Comptoir</p>
                </div>
            </div>

            <!-- Chaise -->
            <div class="gallery-item">
                <picture>
                    <source srcset="../../assets/images/salons/grenoble/chaise-grenoble.webp" type="image/webp">
                    <img src="../../assets/images/salons/grenoble/chaise-grenoble.jpg" alt="Chaise de barbier">
                </picture>
                <div class="item-info">
                    <p class="item-title">La Chaise</p>
                </div>
            </div>
        </div>
    </section>

    <!-- LIGHTBOX -->
    <div class="lightbox" id="lightbox">
        <div class="lightbox-header">
            <button class="lightbox-close" id="lightbox-close">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
            </button>
            <span class="lightbox-counter"><span id="current-index">1</span> / <span id="total-count">4</span></span>
            <div style="width: 44px;"></div>
        </div>
        <div class="lightbox-content">
            <img src="" alt="" class="lightbox-image" id="lightbox-image">
        </div>
        <div class="lightbox-nav">
            <button id="prev-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M19 12H5M12 19l-7-7 7-7" />
                </svg>
            </button>
            <button id="next-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M5 12h14M12 5l7 7-7 7" />
                </svg>
            </button>
        </div>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
        <div class="nav-row">
            <a href="index.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                </svg>
                Accueil
            </a>
            <a href="prestations.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="8" r="5" />
                    <path d="M3 21v-2a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4v2" />
                </svg>
                Tarifs
            </a>
            <!-- CTA Central -->
            <a href="reserver.html" class="nav-cta">
                <div class="nav-cta-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                        <line x1="16" y1="2" x2="16" y2="6" />
                        <line x1="8" y1="2" x2="8" y2="6" />
                        <line x1="3" y1="10" x2="21" y2="10" />
                    </svg>
                </div>
                <span class="nav-cta-label">Réserver</span>
            </a>
            <a href="galerie.html" class="nav-item active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                    <circle cx="8.5" cy="8.5" r="1.5" />
                    <polyline points="21 15 16 10 5 21" />
                </svg>
                Galerie
            </a>
            <a href="contact.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                    <circle cx="12" cy="10" r="3" />
                </svg>
                Contact
            </a>
        </div>
    </nav>

    <script>
        // Header scroll effect
        const header = document.getElementById('header');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        }, { passive: true });

        const galleryItems = document.querySelectorAll('.gallery-item');

        // Lightbox functionality
        const lightbox = document.getElementById('lightbox');
        const lightboxImage = document.getElementById('lightbox-image');
        const lightboxClose = document.getElementById('lightbox-close');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const currentIndex = document.getElementById('current-index');
        const totalCount = document.getElementById('total-count');

        let currentImageIndex = 0;
        let visibleItems = [];

        function updateVisibleItems() {
            visibleItems = Array.from(galleryItems).filter(item => item.style.display !== 'none');
            totalCount.textContent = visibleItems.length;
        }

        function showImage(index) {
            const item = visibleItems[index];
            const img = item.querySelector('img');
            const source = item.querySelector('source[type="image/webp"]');
            if (img) {
                lightboxImage.src = source ? source.srcset : img.src;
                lightboxImage.alt = img.alt;
                lightboxImage.style.background = '';
                lightboxImage.style.width = '';
                lightboxImage.style.height = '';
            }
            currentIndex.textContent = index + 1;
        }

        galleryItems.forEach((item) => {
            item.addEventListener('click', () => {
                updateVisibleItems();
                currentImageIndex = visibleItems.indexOf(item);
                showImage(currentImageIndex);
                lightbox.classList.add('active');
                document.body.style.overflow = 'hidden';
            });
        });

        lightboxClose.addEventListener('click', () => {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        });

        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox || e.target.classList.contains('lightbox-content')) {
                lightbox.classList.remove('active');
                document.body.style.overflow = '';
            }
        });

        prevBtn.addEventListener('click', () => {
            currentImageIndex = (currentImageIndex - 1 + visibleItems.length) % visibleItems.length;
            showImage(currentImageIndex);
        });

        nextBtn.addEventListener('click', () => {
            currentImageIndex = (currentImageIndex + 1) % visibleItems.length;
            showImage(currentImageIndex);
        });

        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;
            if (e.key === 'Escape') {
                lightbox.classList.remove('active');
                document.body.style.overflow = '';
            } else if (e.key === 'ArrowLeft') {
                prevBtn.click();
            } else if (e.key === 'ArrowRight') {
                nextBtn.click();
            }
        });

        // Touch swipe
        let touchStartX = 0;
        lightbox.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        lightbox.addEventListener('touchend', (e) => {
            const diff = touchStartX - e.changedTouches[0].screenX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) nextBtn.click();
                else prevBtn.click();
            }
        }, { passive: true });

        updateVisibleItems();
    </script>
</body>

</html>
