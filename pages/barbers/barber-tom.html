    <style>
        @font-face {
            font-family: 'Orbitron';
            src: url('../../assets/fonts/Orbitron-ExtraBold.ttf') format('truetype');
            font-weight: 800;
            font-style: normal;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== CUSTOM CURSOR ===== */
        @media (pointer: fine) {
            * { cursor: none !important; }
        }
        .cursor-dot {
            position: fixed;
            top: 0; left: 0;
            width: 8px; height: 8px;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10001;
            mix-blend-mode: difference;
            transform: translate(-50%, -50%);
            transition: transform 0.05s ease;
            display: none;
        }
        .cursor-ring {
            position: fixed;
            top: 0; left: 0;
            width: 40px; height: 40px;
            border: 1.5px solid rgba(255,255,255,0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 10001;
            mix-blend-mode: difference;
            transform: translate(-50%, -50%);
            transition: width 0.3s ease, height 0.3s ease, border-color 0.3s ease;
            display: none;
        }
        .cursor-ring.hovering {
            width: 60px; height: 60px;
            border-color: rgba(255,255,255,0.8);
        }

        /* ===== GRAIN OVERLAY ===== */
        .grain {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 9000;
            pointer-events: none;
            opacity: 0.03;
        }

        /* ===== PAGE TRANSITION ===== */
        .page-transition {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .page-transition.active {
            opacity: 1;
            pointer-events: all;
        }

        /* ===== LETTER REVEAL ===== */
        .profile-name .letter {
            display: inline-block;
            transform: translateY(110%);
            transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            transition-delay: var(--delay);
        }
        .page.loaded .profile-name .letter {
            transform: translateY(0);
        }

        /* ===== STAGGERED ENTRANCE ===== */
        .stagger {
            opacity: 0;
            transform: translateY(25px);
            transition: opacity 0.7s cubic-bezier(0.4, 0, 0.2, 1), transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .page.loaded .stagger {
            opacity: 1;
            transform: translateY(0);
        }

        /* ===== HEADER ===== */
        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid transparent;
            transition: all 0.3s ease;
        }
        .header.scrolled {
            background: #000;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .back-btn {
            width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 50%;
            color: #fff;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .back-btn:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.2);
        }
        .back-btn svg { width: 18px; height: 18px; }
        .logo { height: 40px; width: auto; }
        .header-spacer { width: 40px; }

        /* ===== HERO ===== */
        .hero {
            position: relative;
            padding-top: 60px;
            overflow: hidden;
        }
        .hero-media-wrap { overflow: hidden; }
        .hero-video {
            width: 100%;
            aspect-ratio: 9/16;
            max-height: 70vh;
            object-fit: cover;
            display: block;
            animation: kenburns 20s ease infinite alternate;
        }
        @keyframes kenburns {
            0% { transform: scale(1); }
            100% { transform: scale(1.08); }
        }
        .hero-gradient {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 200px;
            background: linear-gradient(to top, #000 0%, transparent 100%);
            pointer-events: none;
        }

        /* ===== PROFILE ===== */
        .profile {
            position: relative;
            z-index: 10;
            margin-top: -80px;
            padding: 0 20px;
        }
        .profile-header {
            text-align: center;
            margin-bottom: 24px;
            overflow: hidden;
        }
        .profile-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 42px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
            overflow: hidden;
        }
        .profile-role {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 16px;
        }
        .profile-salon {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .profile-salon svg { width: 14px; height: 14px; }

        /* ===== INFO CARDS ===== */
        .info-section {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        .info-card {
            flex: 1;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
        }
        .info-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .info-label {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* ===== BIO ===== */
        .bio-section {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .bio-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            color: rgba(255,255,255,0.7);
        }
        .bio-text {
            font-size: 14px;
            line-height: 1.6;
            color: rgba(255,255,255,0.8);
        }

        /* ===== CTA BUTTON ===== */
        .cta-section { margin-bottom: 32px; }
        .cta-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 18px 24px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 14px;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            text-decoration: none;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .cta-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: shimmer-cta 3s infinite;
        }
        @keyframes shimmer-cta {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        .cta-btn:active {
            transform: scale(0.98);
            background: rgba(255,255,255,0.9);
        }
        .cta-btn svg {
            width: 20px; height: 20px;
            position: relative; z-index: 1;
        }
        .cta-btn span {
            position: relative; z-index: 1;
        }

        /* ===== GALLERY ===== */
        .gallery-section { padding: 0 0 100px; }
        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 16px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .section-title::after {
            content: '';
            flex: 1; height: 1px;
            background: linear-gradient(to right, rgba(255,255,255,0.3), transparent);
        }
        .gallery {
            columns: 2;
            column-gap: 8px;
            padding: 0 8px;
        }
        .gallery-item {
            break-inside: avoid;
            margin-bottom: 8px;
            border-radius: 12px;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        .gallery-item.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .gallery-item img,
        .gallery-item video {
            width: 100%;
            display: block;
            object-fit: cover;
        }

        /* ===== ACCESSIBILITY ===== */
        .skip-to-content {
            position: absolute;
            top: -40px; left: 0;
            background: #fff; color: #000;
            padding: 8px 16px;
            z-index: 10000;
            font-size: 14px;
            text-decoration: none;
            transition: top 0.2s;
        }
        .skip-to-content:focus { top: 0; }
        a:focus-visible, button:focus-visible {
            outline: 2px solid #fff;
            outline-offset: 2px;
        }

        /* ===== DESKTOP 768px ===== */
        @media (min-width: 768px) {
            .back-btn:hover {

        /* ===== DESKTOP 1024px - SPLIT LAYOUT ===== */
        @media (min-width: 1024px) {

                pointer-events: none; z-index: 0;
            }
            .header { z-index: 100; }
            .logo { height: 50px; }
            .hero {

                left: 0; top: 0;

                align-items: flex-start;
                justify-content: center;

                z-index: 1;
                overflow: visible;
            }
            .hero-media-wrap {
                width: 80%; max-width: 400px;
                border-radius: 24px;
                overflow: hidden;
                box-shadow: 0 25px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.1);
            }
            .hero-video {
                width: 100%; max-width: none;
                max-height: 75vh;
                aspect-ratio: 9/16;
                border-radius: 0;
            }
            .hero-gradient { display: none; }
            .profile {
                position: relative; z-index: 2;
                margin-left: 45%; margin-top: 0;
                padding: 100px 60px 40px;
                max-width: 600px;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
            .profile-header {
                text-align: left;
                margin-bottom: 32px;
            }
            .profile-name { font-size: 56px; }
            .profile-role { font-size: 16px; }
            .info-section {
                justify-content: flex-start;
                gap: 16px; margin-bottom: 32px;
            }
            .info-card {
                flex: 0 0 auto;
                min-width: 140px;

            }
            .info-value { font-size: 28px; }
            .bio-section { padding: 24px; margin-bottom: 32px; }
            .bio-title { font-size: 18px; }
            .bio-text { font-size: 15px; line-height: 1.7; }
            .cta-section { margin-bottom: 0; }
            .cta-btn {
                width: auto;

                font-size: 14px;
            }
            .gallery-section {
                position: relative; z-index: 2;

                max-width: 700px;
            }
            .section-title {

                margin-bottom: 24px;
            }
            .gallery {
                columns: 2; column-gap: 16px;

            }
            .gallery-item {
                margin-bottom: 16px;
                border-radius: 16px;
            }
        }

        /* ===== REDUCED MOTION ===== */
        @media (prefers-reduced-motion: reduce) {
            *, .gallery-item, .stagger, .profile-name .letter {
                animation: none !important;
                transition: none !important;
                opacity: 1 !important;
                transform: none !important;
            }
            .cta-btn::before { animation: none !important; }
        }
    </style>

    <script>
        /* Header scroll */
        var header = document.getElementById('header');
        window.addEventListener('scroll', function() {
            header.classList.toggle('scrolled', window.scrollY > 50);
        }, { passive: true });

        /* Letter reveal */
        document.querySelectorAll('[data-split]').forEach(function(el) {
            var text = el.textContent.trim();
            el.textContent = '';
            text.split('').forEach(function(char, i) {
                var span = document.createElement('span');
                span.className = 'letter';
                span.textContent = char === ' ' ? '\u00A0' : char;
                span.style.setProperty('--delay', (0.15 + i * 0.06) + 's');
                el.appendChild(span);
            });
        });

        /* Staggered entrance */
        window.addEventListener('load', function() {
            requestAnimationFrame(function() {
                document.getElementById('page').classList.add('loaded');
            });
        });

        /* Gallery IntersectionObserver */
        var galleryObs = new IntersectionObserver(function(entries) {
            entries.forEach(function(entry) {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    galleryObs.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.gallery-item').forEach(function(item) {
            galleryObs.observe(item);
        });

        /* Page transition */
        var trans = document.getElementById('pageTransition');
        document.querySelectorAll('a[data-link]').forEach(function(link) {
            link.addEventListener('click', function(e) {
                var href = link.getAttribute('href');
                if (!href || href.charAt(0) === '#') return;
                e.preventDefault();
                trans.classList.add('active');
                setTimeout(function() { window.location.href = href; }, 700);
            });
        });

        /* bfcache fix */
        window.addEventListener('pageshow', function(e) {
            if (e.persisted) trans.classList.remove('active');
        });

        /* Custom cursor (pointer: fine only) */
        if (window.matchMedia('(pointer: fine)').matches) {
            var dot = document.getElementById('cursorDot');
            var ring = document.getElementById('cursorRing');
            dot.style.display = 'block';
            ring.style.display = 'block';
            var mouseX = 0, mouseY = 0, ringX = 0, ringY = 0;

            document.addEventListener('mousemove', function(e) {
                mouseX = e.clientX;
                mouseY = e.clientY;
                dot.style.left = mouseX + 'px';
                dot.style.top = mouseY + 'px';
            });

            (function animateRing() {
                ringX += (mouseX - ringX) * 0.15;
                ringY += (mouseY - ringY) * 0.15;
                ring.style.left = ringX + 'px';
                ring.style.top = ringY + 'px';
                requestAnimationFrame(animateRing);
            })();

            document.querySelectorAll('a, button, .cta-btn').forEach(function(el) {
                el.addEventListener('mouseenter', function() { ring.classList.add('hovering'); });
                el.addEventListener('mouseleave', function() { ring.classList.remove('hovering'); });
            });

            /* Magnetic CTA */
            var ctaBtn = document.getElementById('ctaBtn');
            if (ctaBtn) {
                ctaBtn.addEventListener('mousemove', function(e) {
                    var rect = ctaBtn.getBoundingClientRect();
                    var x = e.clientX - rect.left - rect.width / 2;
                    var y = e.clientY - rect.top - rect.height / 2;
                    ctaBtn.style.transform = 'translate(' + (x * 0.15) + 'px, ' + (y * 0.15) + 'px)';
                });
                ctaBtn.addEventListener('mouseleave', function() {
                    ctaBtn.style.transform = 'translate(0, 0)';
                });
            }
        }
    </script>
    <script src="../../assets/js/cookie-consent.js" defer></script>
</body>
