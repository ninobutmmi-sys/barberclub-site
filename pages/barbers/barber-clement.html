<body>
    <!-- PAGE TRANSITION -->
    <div class="page-transition" id="pageTransition"></div>

    <!-- GRAIN TEXTURE -->
    <svg class="grain" xmlns="http://www.w3.org/2000/svg">
        <filter id="grain-filter">
            <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
        </filter>
        <rect width="100%" height="100%" filter="url(#grain-filter)"/>
    </svg>

    <!-- CUSTOM CURSOR -->
    <div class="cursor-dot" id="cursorDot"></div>
    <div class="cursor-ring" id="cursorRing"></div>

    <a href="#main-content" class="skip-to-content">Aller au contenu principal</a>

    <!-- PAGE WRAPPER -->
    <div class="page" id="page">
        <!-- HEADER -->
        <header class="header" id="header">
            <a href="../grenoble/barbers.html" class="back-btn trans-link" onclick="if(history.length>1){event.preventDefault();transitionTo(document.referrer||'../grenoble/barbers.html');return false}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </a>
            <a href="../../" class="logo-link trans-link"><img src="../../assets/images/common/logo-blanc.png" alt="BarberClub" class="logo"></a>
            <div class="header-spacer"></div>
        </header>

        <!-- HERO -->
        <section class="hero" id="main-content">
            <video class="hero-video" autoplay loop muted playsinline poster="../../assets/images/barbers/clement.png">
                <source src="../../assets/videos/barbers/clement.mp4" type="video/mp4">
            </video>
            <div class="hero-gradient"></div>
        </section>

        <!-- PROFILE -->
        <div class="profile">
            <div class="profile-header">
                <h1 class="profile-name" data-split>Clément</h1>
                <p class="profile-role">Barber</p>
                <span class="profile-salon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                        <circle cx="12" cy="10" r="3"/>
                    </svg>
                    Salon de Grenoble
                </span>
            </div>

            <!-- Info Cards -->
            <div class="info-section">
                <div class="info-card">
                    <div class="info-value">20</div>
                    <div class="info-label">Ans</div>
                </div>
            </div>

            <!-- Bio -->
            <div class="bio-section">
                <h2 class="bio-title">À propos</h2>
                <p class="bio-text">
                    Accueillant et expérimenté, Clem sait te mettre à l'aise tout en réalisant une coupe impeccable.
                    Un moment agréable et un résultat sûr.
                </p>
            </div>

            <!-- CTA Button -->
            <div class="cta-section">
                <a href="../grenoble/reserver.html?barber=Clement" class="cta-btn trans-link" id="ctaBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                        <line x1="8" y1="2" x2="8" y2="6"/>
                        <line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                    <span>Prendre RDV avec Clément</span>
                </a>
            </div>
        </div>

        <!-- GALLERY -->
        <section class="gallery-section">
            <h2 class="section-title">Ses Réalisations</h2>
            <div class="gallery">
                <!-- Image -->
                <div class="gallery-item">
                    <img loading="lazy" src="../../assets/videos/coupes-clement/IMG_0365.PNG" alt="Coupe Clément">
                </div>
                <!-- Video 1 -->
                <div class="gallery-item">
                    <video autoplay loop muted playsinline preload="none">
                        <source src="../../assets/videos/coupes-clement/IMG_0861.mp4" type="video/mp4">
                    </video>
                </div>
                <!-- Video 2 -->
                <div class="gallery-item">
                    <video autoplay loop muted playsinline preload="none">
                        <source src="../../assets/videos/coupes-clement/IMG_1497.mp4" type="video/mp4">
                    </video>
                </div>
                <!-- Video 3 -->
                <div class="gallery-item">
                    <video autoplay loop muted playsinline preload="none">
                        <source src="../../assets/videos/coupes-clement/IMG_1508.mp4" type="video/mp4">
                    </video>
                </div>
                <!-- Video 4 -->
                <div class="gallery-item">
                    <video autoplay loop muted playsinline preload="none">
                        <source src="../../assets/videos/coupes-clement/IMG_2205.mp4" type="video/mp4">
                    </video>
                </div>
                <!-- Video 5 -->
                <div class="gallery-item">
                    <video autoplay loop muted playsinline preload="none">
                        <source src="../../assets/videos/coupes-clement/IMG_1995.mp4" type="video/mp4">
                    </video>
                </div>
            </div>
        </section>
    </div>

    <script>
        // PAGE TRANSITION
        var trans = document.getElementById('pageTransition');

        function transitionTo(url) {
            trans.classList.add('active');
            setTimeout(function() { window.location.href = url; }, 700);
        }

        // bfcache fix
        window.addEventListener('pageshow', function(e) {
            if (e.persisted) trans.classList.remove('active');
        });

        // Intercept all transition links
        document.querySelectorAll('.trans-link').forEach(function(link) {
            link.addEventListener('click', function(e) {
                if (link.classList.contains('back-btn')) return; // handled by onclick
                e.preventDefault();
                transitionTo(link.href);
            });
        });

        // LETTER REVEAL
        document.querySelectorAll('[data-split]').forEach(function(el) {
            var text = el.textContent;
            el.innerHTML = '';
            text.split('').forEach(function(char, i) {
                var span = document.createElement('span');
                span.className = 'letter';
                span.textContent = char === ' ' ? '\u00A0' : char;
                span.style.transitionDelay = (0.15 + i * 0.06) + 's';
                el.appendChild(span);
            });
        });

        // STAGGERED ENTRANCE
        window.addEventListener('load', function() {
            requestAnimationFrame(function() {
                document.getElementById('page').classList.add('loaded');
            });
        });

        // HEADER SCROLL
        var header = document.getElementById('header');
        window.addEventListener('scroll', function() {
            header.classList.toggle('scrolled', window.scrollY > 50);
        }, { passive: true });

        // GALLERY INTERSECTION OBSERVER
        var galleryObserver = new IntersectionObserver(function(entries) {
            entries.forEach(function(entry) {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    galleryObserver.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

        document.querySelectorAll('.gallery-item').forEach(function(item) {
            galleryObserver.observe(item);
        });

        // CUSTOM CURSOR (desktop only)
        if (window.matchMedia('(pointer: fine)').matches) {
            var dot = document.getElementById('cursorDot');
            var ring = document.getElementById('cursorRing');
            var mouseX = 0, mouseY = 0;
            var ringX = 0, ringY = 0;

            document.addEventListener('mousemove', function(e) {
                mouseX = e.clientX;
                mouseY = e.clientY;
                dot.style.transform = 'translate(' + (mouseX - 4) + 'px, ' + (mouseY - 4) + 'px)';
            });

            function animateRing() {
                ringX += (mouseX - ringX) * 0.15;
                ringY += (mouseY - ringY) * 0.15;
                ring.style.left = ringX + 'px';
                ring.style.top = ringY + 'px';
                requestAnimationFrame(animateRing);
            }
            animateRing();

            // Ring expands on hovering links
            document.querySelectorAll('a, button, .cta-btn').forEach(function(el) {
                el.addEventListener('mouseenter', function() { ring.classList.add('hover'); });
                el.addEventListener('mouseleave', function() { ring.classList.remove('hover'); });
            });
        }

        // MAGNETIC CTA (desktop only)
        if (window.matchMedia('(pointer: fine)').matches) {
            var cta = document.getElementById('ctaBtn');
            if (cta) {
                cta.addEventListener('mousemove', function(e) {
                    var rect = cta.getBoundingClientRect();
                    var x = e.clientX - rect.left - rect.width / 2;
                    var y = e.clientY - rect.top - rect.height / 2;
                    cta.style.transform = 'translate(' + (x * 0.15) + 'px, ' + (y * 0.3) + 'px)';
                });
                cta.addEventListener('mouseleave', function() {
                    cta.style.transform = '';
                });
            }
        }
    </script>
    <script src="../../assets/js/cookie-consent.js" defer></script>
</body>
