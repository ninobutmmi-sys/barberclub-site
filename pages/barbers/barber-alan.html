    <meta property="og:type" content="profile">

    <link rel="stylesheet" href="../../assets/css/base.css">
    <link rel="stylesheet" href="../../assets/css/barber-profile.css">
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Alan",
        "jobTitle": "Barbier",
        "description": "Découvrez Alan, barbier chez BarberClub Grenoble. À l'écoute et passionné, il aime échanger et se perfectionner. Détente, conseils et coupe propre au 5 Rue Clôt Bey.",
        "image": "https://barberclub-grenoble.fr/assets/images/barbers/alan.png",
        "worksFor": {
            "@type": "BarberShop",
            "name": "BarberClub Grenoble"
        },
        "workLocation": {
            "@type": "Place",
            "address": "5 Rue Clôt Bey, 38000 Grenoble"
        }
    }
    </script>
</head>

<body>
    <!-- Grain texture overlay -->
    <svg class="grain" xmlns="http://www.w3.org/2000/svg">
        <filter id="grain-filter">
            <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
        </filter>
        <rect width="100%" height="100%" filter="url(#grain-filter)"/>
    </svg>

    <!-- Page transition overlay -->
    <div class="page-transition" id="pageTransition"></div>

    <!-- Custom cursor -->
    <div class="cursor-dot" id="cursorDot"></div>
    <div class="cursor-ring" id="cursorRing"></div>

    <a href="#main-content" class="skip-to-content">Aller au contenu principal</a>

    <div class="page" id="page">

        <header class="header" id="header">
            <a href="../grenoble/barbers.html" class="back-btn" data-link>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </a>
            <a href="../../" class="logo-link" data-link><img src="../../assets/images/common/logo-blanc.png" alt="BarberClub" class="logo"></a>
            <div class="header-spacer"></div>
        </header>

        <section class="hero" id="main-content">
            <div class="hero-media-wrap">
                <video class="hero-video" autoplay loop muted playsinline poster="../../assets/images/barbers/alan.png">
                    <source src="../../assets/videos/barbers/alan.mp4" type="video/mp4">
                </video>
            </div>
            <div class="hero-gradient"></div>
        </section>

        <div class="profile">
            <div class="profile-header">
                <h1 class="profile-name" data-split>Alan</h1>
                <p class="profile-role stagger" style="transition-delay:0.4s">Barber</p>
                <span class="profile-salon stagger" style="transition-delay:0.5s">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                        <circle cx="12" cy="10" r="3"/>
                    </svg>
                    Salon de Grenoble
                </span>
            </div>

            <div class="info-section stagger" style="transition-delay:0.6s">
                <div class="info-card">
                    <div class="info-value">25</div>
                    <div class="info-label">Ans</div>
                </div>
            </div>

            <div class="bio-section stagger" style="transition-delay:0.7s">
                <h2 class="bio-title">À propos</h2>
                <p class="bio-text">
                    À l'écoute, Alan aime échanger avec ses clients et se perfectionner chaque jour.
                    Détente, conseils et coupe propre au rendez-vous.
                </p>
            </div>

            <div class="cta-section stagger" style="transition-delay:0.8s">
                <a href="../grenoble/reserver.html?barber=Alan" class="cta-btn" id="ctaBtn" data-link>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                        <line x1="8" y1="2" x2="8" y2="6"/>
                        <line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                    <span>Prendre RDV avec Alan</span>
                </a>
            </div>
        </div>

        <section class="gallery-section stagger" style="transition-delay:0.9s">
            <h2 class="section-title">Ses Réalisations</h2>
            <div class="gallery">
                <div class="gallery-item">
                    <img loading="lazy" src="../../assets/videos/Barbers-coupes/Coupe Alan/Couep 5.jpg" alt="Coupe Alan">
                </div>
                <div class="gallery-item">
                    <video autoplay loop muted playsinline>
                        <source src="../../assets/videos/Barbers-coupes/Coupe Alan/Coupe 2.mp4" type="video/mp4">
                    </video>
                </div>
                <div class="gallery-item">
                    <img loading="lazy" src="../../assets/videos/Barbers-coupes/Coupe Alan/Coupe 3.jpg" alt="Coupe Alan">
                </div>
                <div class="gallery-item">
                    <img loading="lazy" src="../../assets/videos/Barbers-coupes/Coupe Alan/Coupe 4.jpg" alt="Coupe Alan">
                </div>
                <div class="gallery-item">
                    <img loading="lazy" src="../../assets/videos/Barbers-coupes/Coupe Alan/Coupe 6.jpg" alt="Coupe Alan">
                </div>
                <div class="gallery-item">
                    <img loading="lazy" src="../../assets/videos/Barbers-coupes/Coupe Alan/Coupe 7.jpg" alt="Coupe Alan">
                </div>
            </div>
        </section>

    </div>

    <script>
        /* Header scroll */
        var header = document.getElementById('header');
        window.addEventListener('scroll', function() {
            header.classList.toggle('scrolled', window.scrollY > 50);
        }, { passive: true });

        /* Letter reveal */
        document.querySelectorAll('[data-split]').forEach(function(el) {
            var text = el.textContent.trim();
            el.textContent = '';
            text.split('').forEach(function(char, i) {
                var span = document.createElement('span');
                span.className = 'letter';
                span.textContent = char === ' ' ? '\u00A0' : char;
                span.style.setProperty('--delay', (0.15 + i * 0.06) + 's');
                el.appendChild(span);
            });
        });

        /* Staggered entrance */
        window.addEventListener('load', function() {
            requestAnimationFrame(function() {
                document.getElementById('page').classList.add('loaded');
            });
        });

        /* Gallery IntersectionObserver */
        var galleryObs = new IntersectionObserver(function(entries) {
            entries.forEach(function(entry) {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    galleryObs.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.gallery-item').forEach(function(item) {
            galleryObs.observe(item);
        });

        /* Page transition */
        var trans = document.getElementById('pageTransition');
        document.querySelectorAll('a[data-link]').forEach(function(link) {
            link.addEventListener('click', function(e) {
                var href = link.getAttribute('href');
                if (!href || href.charAt(0) === '#') return;
                e.preventDefault();
                trans.classList.add('active');
                setTimeout(function() { window.location.href = href; }, 700);
            });
        });

        /* bfcache fix */
        window.addEventListener('pageshow', function(e) {
            if (e.persisted) trans.classList.remove('active');
        });

        /* Custom cursor (pointer: fine only) */
        if (window.matchMedia('(pointer: fine)').matches) {
            var dot = document.getElementById('cursorDot');
            var ring = document.getElementById('cursorRing');
            dot.style.display = 'block';
            ring.style.display = 'block';
            var mouseX = 0, mouseY = 0, ringX = 0, ringY = 0;

            document.addEventListener('mousemove', function(e) {
                mouseX = e.clientX;
                mouseY = e.clientY;
                dot.style.left = mouseX + 'px';
                dot.style.top = mouseY + 'px';
            });

            (function animateRing() {
                ringX += (mouseX - ringX) * 0.15;
                ringY += (mouseY - ringY) * 0.15;
                ring.style.left = ringX + 'px';
                ring.style.top = ringY + 'px';
                requestAnimationFrame(animateRing);
            })();

            document.querySelectorAll('a, button, .cta-btn').forEach(function(el) {
                el.addEventListener('mouseenter', function() { ring.classList.add('hovering'); });
                el.addEventListener('mouseleave', function() { ring.classList.remove('hovering'); });
            });

            /* Magnetic CTA */
            var ctaBtn = document.getElementById('ctaBtn');
            if (ctaBtn) {
                ctaBtn.addEventListener('mousemove', function(e) {
                    var rect = ctaBtn.getBoundingClientRect();
                    var x = e.clientX - rect.left - rect.width / 2;
                    var y = e.clientY - rect.top - rect.height / 2;
                    ctaBtn.style.transform = 'translate(' + (x * 0.15) + 'px, ' + (y * 0.15) + 'px)';
                });
                ctaBtn.addEventListener('mouseleave', function() {
                    ctaBtn.style.transform = 'translate(0, 0)';
                });
            }
        }
    </script>
    <script src="../../assets/js/cookie-consent.js" defer></script>
</body>

</html>
